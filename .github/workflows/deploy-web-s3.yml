name: Deploy Web to S3 :)

on:
  push:
    brance=hes: [main]
    paths:
      - "app/**"

jobs:
  deploy-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout inicial
        uses: actions/checkout@v4

      - name: Configurar las credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: {{ secrets.AWS_SECRET_ACCESS_KEY_ID}}
          aws-region: {{ secrets.AWS_REGION}}

      - name: Sincornizar archivos al bonito S3
        run: aws s3 sync app/ s3://${{ secrets.S3_BUCKET_WEB }}/ --exclude "Dockerfile" --exclude ".dockerignore" --delete